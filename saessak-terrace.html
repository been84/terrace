<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>새싹테라스 · Saessak Terrace</title>
<style>
  :root{
    --moss:#3f6b4c; --sprout:#7fe05a; --sprout-bright:#8fd14f;
    --sun:#f4b942; --sun-deep:#e0922c; --gold:#ffd96b;
    --bg-deep:#0a1c14; --bg-mid:#112c1e; --bg-card:#163320; --bg-card2:#0f2818;
    --panel:#10271a; --line:#1f3a26; --line2:#26512f;
    --cream:#eafbe0; --text-soft:#9bbf9f; --text-dim:#7e9a86;
    --berry:#f56b8a; --berry-deep:#c43a5c;
    --sky:#4fc3d9; --sky-soft:#8fd0e0;
    --plum:#5b4a8f; --plum-light:#8a6fc0; --plum-bg:#241a30; --plum-text:#c5a8f0;
    --morning:#c45ce0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI","Malgun Gothic",sans-serif;background:radial-gradient(circle at 20% 10%,#1a3a2a 0%,#0e221a 55%,#081a12 100%);color:var(--cream);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px;}
  .phone{height:min(96vh,844px);aspect-ratio:9/19.5;max-width:96vw;background:radial-gradient(circle at 50% 18%,var(--bg-mid),var(--bg-deep));border-radius:44px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 60px -20px rgba(0,0,0,.7),0 0 0 9px #1a1a1e,0 0 0 11px #34343a;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:108px;height:22px;background:#000;border-radius:0 0 15px 15px;z-index:90;}
  .statusbar{height:42px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 5px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:12px;z-index:20;}
  .statusbar .r{font-size:11px;letter-spacing:1px;}
  .screen{flex:1;position:relative;overflow:hidden;}
  .view{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;overflow:hidden;}
  .view.active{opacity:1;pointer-events:auto;z-index:2;}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{width:0;}
  .pad{padding:14px 16px 22px;}
  .amb{position:absolute;pointer-events:none;opacity:.26;animation:floaty 6s ease-in-out infinite;font-size:18px;}
  @keyframes floaty{50%{transform:translateY(-10px) rotate(6deg);}}
  .eyebrow{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--sun);text-transform:uppercase;}
  .title-lg{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:19px;color:var(--cream);}
  .sub{font-size:11.5px;color:var(--text-soft);line-height:1.5;}
  .card{background:linear-gradient(160deg,var(--bg-card),var(--bg-card2));border:1.5px solid var(--line2);border-radius:20px;padding:15px;}
  .btn{position:relative;z-index:0;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:15px;padding:14px;border-radius:18px;color:#0c2414;background:linear-gradient(180deg,var(--sprout),#4caa32);box-shadow:0 5px 0 #2f5239;transition:.1s;}
  .btn::before{content:'';position:absolute;z-index:-1;top:0;left:0;right:0;height:48%;background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0));pointer-events:none;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #2f5239;}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--sun-deep));box-shadow:0 5px 0 #b9701c;color:#5a3b10;}
  .btn.gold:active{box-shadow:0 2px 0 #b9701c;}
  .btn.plum{background:linear-gradient(180deg,var(--plum-light),var(--plum));box-shadow:0 5px 0 #43365a;color:#fff;}
  .btn.plum:active{box-shadow:0 2px 0 #43365a;}
  .btn.ghost{background:var(--panel);border:1.5px solid var(--line2);color:var(--text-soft);box-shadow:0 4px 0 #0a1c12;}
  .pill{display:inline-flex;align-items:center;gap:5px;background:#13261a;border:1.5px solid var(--sun);border-radius:16px;padding:5px 11px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;color:var(--gold);font-size:13px;}
  .coin{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe39a,var(--sun));border:1.5px solid var(--sun-deep);flex:none;}
  /* 로그인 */
  #v-login .scroll{display:flex;}
  #v-login .pad{display:flex;flex-direction:column;flex:1;justify-content:center;min-height:100%;}
  .logo-orb{width:80px;height:80px;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 42% 35%,#d6ffa8,var(--sprout-bright) 60%,#4f9e2e);border:3px solid #3a7a26;display:grid;place-items:center;font-size:40px;box-shadow:0 0 30px rgba(143,209,79,.4);}
  .brand-name{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:26px;text-align:center;margin-top:13px;}
  .brand-tag{font-size:11px;color:var(--text-soft);text-align:center;margin-top:5px;}
  .role-q{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:13px;color:#cfe6d4;text-align:center;margin:20px 0 11px;}
  .roles{display:flex;gap:11px;}
  .role{flex:1;border-radius:20px;padding:15px 9px;cursor:pointer;border:2.5px solid transparent;text-align:center;transition:.15s;}
  .role:active{transform:scale(.97);}
  .role.child{background:linear-gradient(180deg,#1a4329,#112c1c);border-color:#3f8a52;}
  .role.parent{background:linear-gradient(180deg,#2a2040,#1c1530);border-color:var(--plum-light);}
  .role .rico{width:60px;height:44px;margin:0 auto;border-radius:14px;display:grid;place-items:center;font-size:28px;}
  .role.child .rico{background:#1c4a2e;}
  .role.parent .rico{background:#372a52;}
  .role b{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:13.5px;display:block;margin-top:8px;}
  .role.child b{color:#9be07a;} .role.parent b{color:var(--plum-text);}
  .role span{font-size:9px;color:var(--text-soft);display:block;margin-top:3px;line-height:1.4;}
  .warn-line{font-size:9px;color:var(--text-dim);text-align:center;margin-top:10px;}
  .divider{display:flex;align-items:center;gap:10px;margin:16px 0 13px;}
  .divider::before,.divider::after{content:"";flex:1;height:1.3px;background:var(--line);}
  .divider span{font-size:10px;color:var(--text-dim);}
  .social{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:12px;border-radius:13px;margin-bottom:8px;font-family:'Gowun Dodum';}
  .social:active{transform:scale(.98);}
  .social.google{background:#fff;color:#1a1a1a;}
  .social.kakao{background:#FEE500;color:#3a1d1d;}
  .social.naver{background:#03C75A;color:#fff;}
  .social.email{background:var(--panel);color:#cfe6d4;border:1.5px solid var(--line2);}
  .social .nlogo{width:19px;height:17px;background:#fff;border-radius:3px;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-weight:900;color:#03C75A;font-size:11px;}
  .login-foot{font-size:10px;color:var(--text-dim);text-align:center;margin-top:5px;}
  .login-foot b{color:var(--sprout);cursor:pointer;}
  .login-foot.tiny{font-size:8.5px;margin-top:7px;}
  /* appbar */
  .appbar{flex:none;display:flex;align-items:center;gap:10px;padding:6px 16px 8px;}
  .icon-btn{width:36px;height:36px;border-radius:11px;background:var(--panel);border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;line-height:1;font-size:16px;cursor:pointer;color:var(--cream);padding:0;}
  .icon-btn svg{display:block;}
  .appbar .who small{font-size:10px;color:var(--text-soft);display:block;}
  .appbar .who b{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:15px;}
  .appbar .sp{flex:1;}
  /* 홈 */
  .level-bar{display:flex;align-items:center;gap:11px;background:var(--panel);border:1.5px solid var(--line2);border-radius:16px;padding:10px 12px;}
  .lv-badge{position:relative;z-index:0;width:38px;height:42px;clip-path:polygon(50% 0%,100% 18%,100% 68%,50% 100%,0% 68%,0% 18%);background:linear-gradient(160deg,#2a5a38,#123320);display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;color:#eafbe0;font-size:14px;flex:none;filter:drop-shadow(0 0 5px rgba(127,224,90,.6));}
  .lv-badge::after{content:'';position:absolute;z-index:-1;top:2px;left:2px;right:2px;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.3),transparent);pointer-events:none;}
  .xp-track{position:relative;height:11px;border-radius:6px;background:#0a1c12;overflow:hidden;margin-top:5px;box-shadow:inset 0 2px 3px rgba(0,0,0,.4);}
  .xp-track::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent calc(12.5% - 1.5px),rgba(0,0,0,.35) calc(12.5% - 1.5px),rgba(0,0,0,.35) 12.5%);pointer-events:none;}
  .xp-fill{position:relative;height:100%;border-radius:6px;background:linear-gradient(180deg,#c8f26a,var(--sprout) 55%,#4caa32);transition:width .5s;box-shadow:0 0 6px rgba(127,224,90,.6);}
  .wallet{display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,#26200e,#1a1608);border:2px solid var(--gold);border-radius:18px;padding:13px;box-shadow:0 0 18px rgba(244,185,66,.15);}
  .wallet .big-coin{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff5d6,var(--sun));border:3px solid var(--sun-deep);display:grid;place-items:center;font-size:23px;flex:none;box-shadow:0 0 16px rgba(244,185,66,.4);}
  .sec-title{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:14px;color:var(--cream);display:flex;align-items:center;gap:6px;}
  .mission{position:relative;display:flex;align-items:center;gap:11px;background:linear-gradient(160deg,var(--bg-card),var(--bg-card2));border:1.5px solid var(--line2);border-radius:16px;padding:11px 11px 11px 15px;cursor:pointer;transition:.15s;overflow:hidden;}
  .mission::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--sprout);}
  .mission.m-eco::before{background:var(--sky);}
  .mission.m-good::before{background:var(--berry);}
  .mission.done::before{background:#4caa32;opacity:.6;}
  .mission:active{transform:scale(.98);}
  .mission.done{opacity:.55;}
  .mission .mico{width:36px;height:36px;border-radius:11px;background:#1c3a26;display:grid;place-items:center;font-size:17px;flex:none;position:relative;}
  .mtag{position:absolute;top:-7px;left:-5px;font-size:8px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;padding:1px 5px;border-radius:6px;white-space:nowrap;}
  .mtag.eco{background:#3a6e2a;color:#d6ffa8;} .mtag.good{background:#2a5570;color:#bfe6ff;}
  .mission .mbody{flex:1;min-width:0;}
  .mission .mbody b{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:12.5px;}
  .mission .mbody span{display:block;font-size:10px;color:var(--text-soft);margin-top:1px;}
  .reward-chip{position:relative;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:12px;color:#3a2405;background:linear-gradient(180deg,#ffe39a,var(--sun) 60%,var(--sun-deep));border:1.5px solid #b9701c;border-radius:13px;padding:4px 10px;flex:none;box-shadow:0 2px 0 #8a5414;}
  .mission.done .reward-chip{background:linear-gradient(180deg,#9ee87a,#4caa32);border-color:#2f5239;color:#0c2414;box-shadow:0 2px 0 #234a1e;}
  .goal-strip{position:relative;display:flex;align-items:center;gap:11px;background:#142e3a;border:1.5px solid #2a6478;border-radius:16px;padding:11px 11px 11px 15px;overflow:hidden;}
  .goal-strip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--sky);}
  .ring{width:46px;height:46px;flex:none;border-radius:50%;display:grid;place-items:center;}
  /* nav */
  .nav{flex:none;display:flex;background:#0a1810;border-top:1.5px solid var(--line);padding:7px 4px 11px;z-index:20;}
  .nav button{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:10px;color:var(--text-dim);padding:6px 0;margin:0 3px;border-radius:14px;transition:.2s;}
  .nav button .ni{font-size:20px;opacity:.55;transition:.2s;}
  .nav button.active{color:var(--sprout);background:rgba(127,224,90,.14);}
  .nav button.active .ni{opacity:1;transform:translateY(-2px) scale(1.12);}
  /* AR */
  .ar-stage{position:relative;flex:1;overflow:hidden;background:linear-gradient(180deg,#a9c7d6 0%,#cdd9c4 42%,#b6c79e 62%,#8fa876 100%);}
  .ar-floor{position:absolute;left:0;right:0;bottom:0;height:36%;background:linear-gradient(180deg,#9fb085,#7d9162);}
  .ar-obj{position:absolute;opacity:.45;}
  .ar-token{position:absolute;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;animation:bob 2.4s ease-in-out infinite;z-index:5;}
  @keyframes bob{50%{transform:translateY(-8px);}}
  .ar-token .tk{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:23px;border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.3);}
  .ar-token .tlab{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:700;font-size:10px;background:#fff;padding:1px 7px;border-radius:9px;color:#333;}
  .ar-token.tapped{animation:pop .5s forwards;}
  @keyframes pop{40%{transform:scale(1.3);}100%{transform:scale(0);opacity:0;}}
  .ar-top{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
  .ar-chip{background:rgba(0,0,0,.45);border-radius:16px;padding:6px 11px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:13px;color:var(--gold);display:flex;align-items:center;gap:5px;}
  .ar-close{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);display:grid;place-items:center;color:#fff;font-size:17px;cursor:pointer;border:none;}
  .battle{position:absolute;top:56px;left:12px;right:12px;background:rgba(13,31,42,.92);border:1.5px solid #3a7fa0;border-radius:16px;padding:9px 12px;z-index:10;}
  .float-coin{position:absolute;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;color:var(--sun-deep);font-size:19px;pointer-events:none;animation:rise 1s ease-out forwards;z-index:30;}
  @keyframes rise{to{opacity:0;transform:translateY(-44px);}}
  .ar-feedback{position:absolute;left:14px;right:14px;bottom:14px;background:rgba(13,36,24,.96);border:2px solid var(--sprout);border-radius:20px;padding:14px;z-index:15;transform:translateY(160%);transition:.4s cubic-bezier(.34,1.4,.5,1);}
  .ar-feedback.show{transform:none;}
  /* AR 타이밍 UI */
  .ar-hint{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(0,0,0,.55);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:13px;padding:9px 18px;border-radius:20px;z-index:11;display:flex;align-items:center;gap:6px;opacity:0;transition:.4s;white-space:nowrap;}
  .ar-hint.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .ar-balance{position:absolute;top:104px;right:14px;background:rgba(0,0,0,.5);border:1.5px solid var(--sun);border-radius:16px;padding:6px 12px;z-index:11;display:flex;align-items:center;gap:5px;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;color:var(--gold);font-size:14px;opacity:0;transform:translateX(20px);transition:.4s;}
  .ar-balance.show{opacity:1;transform:none;}
  .ar-center-token{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%) scale(.4);z-index:10;cursor:pointer;display:flex;flex-direction:column;align-items:center;opacity:0;transition:.5s cubic-bezier(.34,1.6,.5,1);}
  .ar-center-token.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .ar-center-token.collected{pointer-events:none;}
  .ar-center-token .ct-glow{position:absolute;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(143,209,79,.5),transparent 65%);animation:ctpulse 1.6s ease-in-out infinite;}
  @keyframes ctpulse{50%{transform:scale(1.25);opacity:.6;}}
  .ar-center-token .ct-ring{position:absolute;width:84px;height:84px;border-radius:50%;border:3px dashed rgba(255,255,255,.85);animation:ctspin 6s linear infinite;}
  @keyframes ctspin{to{transform:rotate(360deg);}}
  .ar-center-token .ct-core{width:66px;height:66px;border-radius:50%;background:radial-gradient(circle at 38% 30%,#fff5d6,#b88a4f 70%,#5a3c1c);border:3px solid #5a3c1c;display:grid;place-items:center;font-size:32px;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:ctbob 2.2s ease-in-out infinite;}
  @keyframes ctbob{50%{transform:translateY(-8px);}}
  .ar-center-token .ct-label{margin-top:14px;background:#fff;color:#5a3c1c;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:700;font-size:12px;padding:3px 12px;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,.3);white-space:nowrap;}
  .ar-arrow{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;opacity:0;transition:.4s;}
  .ar-arrow.show{opacity:1;}
  .ar-arrow .arrow-ico{font-size:44px;line-height:.5;color:var(--gold);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;animation:arrowbounce 1s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
  @keyframes arrowbounce{50%{transform:translateY(8px);}}
  .ar-arrow .arrow-txt{background:rgba(0,0,0,.55);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:700;font-size:11px;padding:3px 11px;border-radius:11px;margin-top:2px;display:inline-block;}
  .ar-flash{position:absolute;inset:0;z-index:14;pointer-events:none;background:radial-gradient(circle at 50% 46%,rgba(255,255,255,.9),rgba(143,209,79,.3) 40%,transparent 70%);opacity:0;}
  .ar-flash.burst{animation:flashburst .7s ease-out;}
  @keyframes flashburst{0%{opacity:0;transform:scale(.3);}25%{opacity:1;}100%{opacity:0;transform:scale(1.6);}}
  .reward-particle{position:absolute;font-size:20px;z-index:14;pointer-events:none;animation:particlefly .9s ease-out forwards;}
  @keyframes particlefly{to{transform:translate(var(--dx),var(--dy)) scale(.3) rotate(180deg);opacity:0;}}
  /* 정원 */
  .pot-bed{display:flex;gap:8px;background:linear-gradient(180deg,#14342a,#0e2620);border:1.5px solid #1f5040;border-radius:20px;padding:14px 6px 10px;}
  .planter{flex:1;text-align:center;cursor:pointer;border-radius:14px;padding:4px 2px;transition:.15s;border:2px solid transparent;}
  .planter.sel{border-color:var(--sprout);background:rgba(127,224,90,.08);}
  .pot-stage{height:84px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;position:relative;}
  .stars{font-size:9px;letter-spacing:-1px;margin-bottom:3px;}
  .pot{width:44px;height:28px;border-radius:5px 5px 11px 11px;background:linear-gradient(180deg,#9a6b42,#6e4a2c);display:grid;place-items:center;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:9px;margin-top:2px;}
  .planter .pname{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:11px;margin-top:5px;}
  .planter .pmeta{font-size:9px;color:var(--text-soft);margin-top:1px;}

/* ============ 상태 ============ */
const S = {
  name: '호영', avatar: '🧒',
  seeds: 335, saved: 210, xp: 660, xpMax: 1000, level: 4,
  goalCur: 620, goalMax: 1000,

  pendingPot: null,
};
const $ = id => document.getElementById(id);
const screen = $('screen');

/* ============ 토스트 ============ */
let toastTimer;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
/* ============ 모달 ============ */
function openModal(html){ $('modalBox').innerHTML=html; $('modalBg').classList.add('show'); }
function closeModal(){ $('modalBg').classList.remove('show'); }
/* ============ 드로어 ============ */
function openDrawer(){ renderDrawer(); $('drawer').classList.add('show'); $('drawerBg').classList.add('show'); }
function closeDrawer(){ $('drawer').classList.remove('show'); $('drawerBg').classList.remove('show'); }

/* ============ 씨앗 갱신 ============ */
function addSeeds(n){ S.seeds=Math.max(0,S.seeds+n); refreshWallets(); }
function refreshWallets(){ document.querySelectorAll('[data-seeds]').forEach(e=>e.textContent=S.seeds); }
function addXp(n){ S.xp+=n; if(S.xp>=S.xpMax){S.xp-=S.xpMax;S.level++;toast('🎉 레벨 업! Lv.'+S.level);celebrate('big');} document.querySelectorAll('[data-xp]').forEach(e=>e.style.width=(S.xp/S.xpMax*100)+'%'); }

/* ============ 컨페티 축하 연출 ============ */
function celebrate(size){
  const phone=$('phone');
  let layer=$('confettiLayer');
  if(!layer){ layer=document.createElement('div'); layer.id='confettiLayer'; phone.appendChild(layer); }
  const colors=['#7fe05a','#f4b942','#4fc3d9','#f56b8a','#c45ce0','#ffd96b','#8fd14f'];
  const count = size==='big' ? 60 : 34;
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    const dur=1.1+Math.random()*1.1;
    c.style.animationDuration=dur+'s';
    c.style.animationDelay=(Math.random()*0.25)+'s';
    // 좌우로 살짝 퍼지게 + 크기 랜덤
    const w=6+Math.random()*7;
    c.style.width=w+'px'; c.style.height=(w*1.4)+'px';
    if(Math.random()<0.4) c.style.borderRadius='50%';
    layer.appendChild(c);
    setTimeout(()=>c.remove(),(dur+0.4)*1000);
  }
}

/* 화면 라우팅은 app2 스크립트에서 정의 */

function doMission(id){

afterRender.ar = () => {

function clearArTimers(){ arTimers.forEach(t=>clearTimeout(t)); arTimers=[]; }
function runArSequence(){
  clearArTimers();
  const hint=$('arHint'), bal=$('arBalance'), center=$('arCenterToken'), arrow=$('arArrow');
  // 초기 상태
  [hint,center,arrow].forEach(e=>e&&e.classList.remove('show'));
  if(bal) bal.classList.remove('show');
  // 우측 잔액: 1~10초
  arTimers.push(setTimeout(()=>bal&&bal.classList.add('show'),1000));
  arTimers.push(setTimeout(()=>bal&&bal.classList.remove('show'),10000));
  // 상단 안내: 1~4초
  arTimers.push(setTimeout(()=>hint&&hint.classList.add('show'),1000));
  arTimers.push(setTimeout(()=>hint&&hint.classList.remove('show'),4000));
  // 중앙 씨앗: 5~10초
  arTimers.push(setTimeout(()=>center&&center.classList.add('show'),5000));
  arTimers.push(setTimeout(()=>{ if(center&&!center.classList.contains('collected')) center.classList.remove('show'); },10000));
  // 바닥 화살표: 7~9초
  arTimers.push(setTimeout(()=>arrow&&arrow.classList.add('show'),7000));
  arTimers.push(setTimeout(()=>arrow&&arrow.classList.remove('show'),9000));
}
function exitAR(){ clearArTimers(); const v=$('arVideo'); if(v){v.pause();} go('home'); }
function collectCenter(){
  const center=$('arCenterToken');
  if(!center||center.classList.contains('collected'))return;
  center.classList.add('collected');
  // 진동
  if(navigator.vibrate) navigator.vibrate([40,60,120]);
  // 빛번짐 플래시
  const flash=$('arFlash');
  flash.classList.add('burst');
  setTimeout(()=>flash.classList.remove('burst'),700);
  // 씨앗 튀는 파티클
  const stage=$('arStage');
  for(let k=0;k<8;k++){
    const p=document.createElement('div'); p.className='reward-particle'; p.textContent='🌱';
    const ang=(k/8)*Math.PI*2, dist=60+Math.random()*30;
    p.style.left='50%'; p.style.top='46%';
    p.style.setProperty('--dx',(Math.cos(ang)*dist)+'px');
    p.style.setProperty('--dy',(Math.sin(ang)*dist)+'px');
    stage.appendChild(p); setTimeout(()=>p.remove(),900);
  }
  // 보상 지급
  const rew=10;
  addSeeds(rew); addXp(20);
  myBattle+=rew; $('myB').textContent=myBattle;
  $('myBar').style.width=(myBattle/(myBattle+friendBattle)*100)+'%';
  // 토큰 사라짐

  const fb=$('arFb');

function chatStep(key,first){
  const node=chatFlow[key];
  const body=$('chatBody');
  // 사용자가 고른 선택지(첫 진입 제외)면 사용자 버블 추가
  if(!first && chatFlow._lastLabel){
    body.insertAdjacentHTML('beforeend',
      `<div style="align-self:flex-end;max-width:78%;background:var(--moss);color:#fff;border-radius:16px 16px 4px 16px;padding:10px 13px;font-size:12.5px">${chatFlow._lastLabel}</div>`);
  }
  // 봇 메시지들
  node.bot.forEach((line,i)=>{
    body.insertAdjacentHTML('beforeend',
      `<div style="display:flex;gap:8px;align-items:flex-end;max-width:82%">
        ${i===node.bot.length-1?'<div style="width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 42% 35%,#d6ffa8,var(--sprout-bright),#4f9e2e);border:1.5px solid #3a7a26;display:grid;place-items:center;font-size:14px;flex:none">🌱</div>':'<div style="width:26px;flex:none"></div>'}
        <div style="background:var(--bg-card);border:1.5px solid var(--line2);border-radius:16px 16px 16px 4px;padding:10px 13px;font-size:12.5px;color:var(--cream);line-height:1.5">${line}</div>
      </div>`);
  });
  // 선택지 버튼
  const opts=node.options.map(([k,label])=>
    `<button onclick="chatPick('${k}','${label.replace(/'/g,'')}')" style="border:1.5px solid var(--sprout);background:rgba(127,224,90,.08);color:var(--sprout);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif;font-weight:800;font-size:12px;padding:9px 14px;border-radius:14px;cursor:pointer">${label}</button>`).join('');
  body.insertAdjacentHTML('beforeend',
    `<div class="chat-opts" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;margin-left:34px">${opts}</div>`);
  // 스크롤 맨 아래로
  const sc=$('chatScroll'); setTimeout(()=>{sc.scrollTop=sc.scrollHeight;},50);
}
function chatPick(key,label){
  // 이전 선택지 버튼 제거
  document.querySelectorAll('.chat-opts').forEach(e=>e.remove());
  chatFlow._lastLabel=label;
  chatStep(key,false);
}
